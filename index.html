<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Sistema de Notas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- BOTÓN CENTRAL -->
  <main class="vista-principal">
    <button id="btnCrearNota" class="btn-crear">
      Crear nota
    </button>
  </main>

  <!-- CONTENEDORES -->
  <section class="paneles">

    <div class="panel">
      <h2>Notas guardadas</h2>
      <div id="listaGuardadas" class="lista-notas"></div>
    </div>

    <div class="panel">
      <h2>Notas archivadas</h2>
      <div id="listaArchivadas" class="lista-notas"></div>
    </div>

  </section>

  <!-- HOJA / MODAL -->
  <div id="visorNota" class="visor-oculto">
    <div class="hoja">

      <input type="hidden" id="notaId" />

      <input
        type="text"
        id="notaTitulo"
        placeholder="Título de la nota"
      />

      <textarea
        id="notaContenido"
        placeholder="Contenido de la nota"
      ></textarea>

      <div class="acciones">
        <button id="btnGuardar">Guardar nota</button>
        <button id="btnEditar">Editar nota</button>
        <button id="btnArchivar">Archivar</button>
        <button id="btnEliminar">Eliminar</button>
        <button id="btnCerrar">Cerrar</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
